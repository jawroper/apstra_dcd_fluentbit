[SERVICE]
    # Flush
    # =====
    # set an interval of seconds before to flush records to a destination
    flush        1

    # Daemon
    # ======
    # instruct Fluent Bit to run in foreground or background mode.
    daemon       Off

    # Log_Level
    # =========
    # Set the verbosity level of the service, values can be:
    #
    # - error
    # - warning
    # - info
    # - debug
    # - trace
    #
    # by default 'info' is set, that means it includes 'error' and 'warning'.
    #log_level    info
    log_level    debug

    # Parsers File
    # ============
    # specify an optional 'Parsers' configuration file
    parsers_file parsers.conf

    # Plugins File
    # ============
    # specify an optional 'Plugins' configuration file to load external plugins.
    plugins_file plugins.conf

    # HTTP Server
    # ===========
    # Enable/Disable the built-in HTTP Server for metrics
    http_server  Off
    http_listen  0.0.0.0
    http_port    2020

    # Storage
    # =======
    # Fluent Bit can use memory and filesystem buffering based mechanisms
    #
    # - https://docs.fluentbit.io/manual/administration/buffering-and-storage
    #
    # storage metrics
    # ---------------
    # publish storage pipeline metrics in '/api/v1/storage'. The metrics are
    # exported only if the 'http_server' option is enabled.
    #
    storage.metrics on

    # storage.path
    # ------------
    # absolute file system path to store filesystem data buffers (chunks).
    #
    # storage.path /tmp/storage

    # storage.sync
    # ------------
    # configure the synchronization mode used to store the data into the
    # filesystem. It can take the values normal or full.
    #
    # storage.sync normal

    # storage.checksum
    # ----------------
    # enable the data integrity check when writing and reading data from the
    # filesystem. The storage layer uses the CRC32 algorithm.
    #
    # storage.checksum off

    # storage.backlog.mem_limit
    # -------------------------
    # if storage.path is set, Fluent Bit will look for data chunks that were
    # not delivered and are still in the storage layer, these are called
    # backlog data. This option configure a hint of maximum value of memory
    # to use when processing these records.
    #
    # storage.backlog.mem_limit 5M

# [INPUT]
#   name cpu
#   tag  cpu.local

    # Read interval (sec) Default: 1
#   interval_sec 1

[INPUT]
    name apstra_dcd
    # dcd_release selects which DCD schema version to decode against — must
    # match the actual version of the DCD server below. See proto/README.md
    # for the full list of supported releases and how to add a new one.
    dcd_release 6.0.0
    dcd_server 192.168.122.199
    local_address 192.168.122.84
    dcd_port 443
    dcd_login <valid_apstra_user_name>
    dcd_password <password_associated_with_valid_apstra_user_name>
    port 7777
    streaming_types perfmon, alerts, events
    refresh_interval 30
    # output_format msgpack
    output_format json
    tag apstra.dcd

    # Native Prometheus exporter — one [INPUT] block handles both Prometheus
    # and your normal [OUTPUT]s simultaneously (see pkg/promexport/README.md).
    # An external Prometheus server scrapes: curl http://<this-host>:9112/metrics
    # prometheus_enabled on
    # prometheus_port    9112
    #
    # Optional: control what Prometheus sees independently of streaming_types.
    # When not set, Prometheus exports whatever streaming_types is set to.
    # Accepts the same values: perfmon, alerts, events (comma-separated).
    # prometheus_streaming_types  perfmon
    #
    # Note: two [INPUT] blocks for this purpose do NOT work on current Fluent
    # Bit versions — FLBPluginConfigKey on a second instance of the same Go
    # plugin returns wrong values, causing a port conflict crash. Use
    # prometheus_streaming_types instead.

    # debug off (default) gates verbose troubleshooting-only log lines
    # (periodic heartbeat/queue-depth confirmations, raw message byte
    # previews). Real errors/warnings always log regardless. Turn on only
    # while actively troubleshooting.
    # debug on

#  Sends every measurement named "apstra.dcd" (the [INPUT] tag above) to
#  a flat file.  Excellent [OUTPUT] to use as a check to make sure data
#  is being processed by the [INPUT] plugin.
#
#  NOTE: the directory /var/log/apstra must exist and be writable by
#        everyone
#        sudo mkdir /var/log/apstra
#        sudo chmod 766 /var/log/apstra
#
#  Output is plain JSON. One measurement per line — pipe to jq for readability
#
#[OUTPUT]
#    Name file
#    Match apstra.dcd
#    Path /var/log/apstra
#    File telemetry.log
#    Format plain

# Sends every series (interface_counters, alert_*, event_*, ...) into one
# InfluxDB measurement named "apstra.dcd" (the [INPUT] tag above), with
# series/device/role/etc. as tags via Auto_Tags. See README.md's "Output
# formats" section for why Auto_Tags works cleanly here, and how to instead
# split into one InfluxDB measurement per series using a rewrite_tag filter.
#
#  InfluxDB V2
#[OUTPUT]
#    Name        influxdb
#    Match       apstra.dcd
#    Host        <ip_address_of_influx_server>
#    Port        8086
#    Database    apstra_dcd
#    HTTP_Token  <valid_influx_token>
#    Auto_Tags   On

# Elasticsearch
#[OUTPUT]
#    Name          es
#    Match         apstra.dcd
#    Host          <ip_address_of_elasticsearch_server>
#    Port          9200
#    Index         apstra-dcd

# Splunk HEC
#[OUTPUT]
#    Name          splunk
#    Match         apstra.dcd
#    Host          <ip_address_of_splunk_server>
#    Port          8088
#    Splunk_Token  <valid_hec_token>

[OUTPUT]
    name  stdout
    match *
